<table mat-table matSort [dataSource]="inventoryItems" class="mat-elevation-z8">
  <!-- Column Checkbox -->
  <ng-container matColumnDef="select">
    <th mat-header-cell *matHeaderCellDef>
      <mat-checkbox
        (change)="$event ? masterToggle() : null"
        [checked]="isAllSelected()"
        [indeterminate]="selection.hasValue() && !isAllSelected()"
      ></mat-checkbox>
    </th>
    <td mat-cell *matCellDef="let row">
      <mat-checkbox (change)="selection.toggle(row)" [checked]="selection.isSelected(row)">
      </mat-checkbox>
    </td>
  </ng-container>

  <!-- Column ID -->
  <ng-container matColumnDef="id">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
    <td mat-cell *matCellDef="let item">{{ item.id }}</td>
  </ng-container>

  <!-- Column  Name -->
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let item">{{ item.name }}</td>
  </ng-container>

  <!-- Column User -->
  <ng-container matColumnDef="user">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>User</th>
    <td mat-cell *matCellDef="let item">{{ item.user }}</td>
  </ng-container>

  <!-- Column Description -->
  <ng-container matColumnDef="description">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
    <td mat-cell *matCellDef="let item">{{ item.description }}</td>
  </ng-container>

  <!-- Column Location -->
  <ng-container matColumnDef="location">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Location</th>
    <td mat-cell *matCellDef="let item">{{ item.location }}</td>
  </ng-container>

  <!-- Column InventoryNumber -->
  <ng-container matColumnDef="inventoryNumber">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Inventory Number</th>
    <td mat-cell *matCellDef="let item">{{ item.inventoryNumber }}</td>
  </ng-container>

  <!-- Column createdAt -->
  <ng-container matColumnDef="createdAt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Created At</th>
    <td mat-cell *matCellDef="let item">{{ item.createdAt | date }}</td>
  </ng-container>

  <!-- Column  modifiedAt -->
  <ng-container matColumnDef="modifiedAt">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Modified At</th>
    <td mat-cell *matCellDef="let item">{{ item.modifiedAt | date }}</td>
  </ng-container>

  <!-- Column deleted -->
  <ng-container matColumnDef="deleted">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Deleted</th>
    <td mat-cell *matCellDef="let item">{{ item.deleted }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="inventoryColumns"></tr>
  <tr mat-row *matRowDef="let row; columns: inventoryColumns"></tr>
</table>
<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons></mat-paginator>
